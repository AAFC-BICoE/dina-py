name: dina-py CI/CD

on:
  push:
    branches: [ master ]
    tags:
      - 'v*.*.*'  # Triggers the CD part when you push a version tag
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install package with dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
          pip install -e .[test]

      - name: Run all tests
        run: |
          pytest tests/ -v

  # --- Only runs on tags merged to master ---
  publish:
    name: Publish to PyPI
    needs: build # Only run if build pass
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: tobeupdated
    permissions:
      id-token: write
      contents: read
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Build package
        run: python -m build
        
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1