name: dina-py CI

on: [push]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'
      - name: Install package with dependencies
        run: |
          pip install -e .[test]
      - name: Run all tests
        run: |
          pytest tests/ -v
